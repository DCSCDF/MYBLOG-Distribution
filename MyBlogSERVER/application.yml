spring:
  datasource:
    url: jdbc:mysql://Your_DB_IP:3306/Your_DB_name?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: your_DB_username
    password: your_DB_password

    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      continue-on-error: true
      platform: mysql
      schema-locations: classpath:schema.sql
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8088

sa-token:
  is-concurrent: false
  timeout: 2592000
  is-share: true
  token-name: token
  is-read-cookie: false
  is-read-header: true
  is-log: false
  token-style: random-128

app:
  cors:
    allowed-origins: Your_WEB_IP/Domain Name, Your_WEB_ADMIN_IP/Domain Name
